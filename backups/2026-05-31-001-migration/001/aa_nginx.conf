#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    server_tokens off;
    include       mime.types;
    include /etc/aa_nginx/conf.d/*.conf;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # gzip compression
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Upstream: Hermes PWA server on localhost:8888
    upstream hermes_pwa {
        server 127.0.0.1:8888;
    }

    # chat.koudai.cool → Open WebUI (Cloudflare handles SSL)
    server {
        listen       80;
        server_name  chat.koudai.cool;

        # 安全加固
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        location / {
        # Prevent API caching by Cloudflare
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Guest token auto-injection
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        # Auto-inject guest token for no-auth mode
        proxy_set_header Cookie "token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjQ2ZTI2ZWI4LTA2NjYtNDM3MS1hOTgyLTMwYmExYTQ0ODlmYyIsImVtYWlsIjoiZ3Vlc3RAY2hhdC5sb2NhbCIsIm5hbWUiOiJHdWVzdCIsInJvbGUiOiJhZG1pbiIsImlhdCI6MTc4MDAwNTQyMCwiZXhwIjoxODExNTQxNDIwfQ.fi5EruaKiGUhKuLjYLmY61NIkcKpnreEEWfSoonmKEw";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }

    # HTTP → HTTPS redirect (port 80)
    server {
        listen       80 default_server;
        server_name  pixelox.cn www.pixelox.cn 47.83.156.11;

        add_header X-Frame-Options SAMEORIGIN;

        location / {
            return 301 https://$host$request_uri;
        }

        # Let's Encrypt ACME challenge (when domain is set up)
        location /.well-known/acme-challenge/ {
            root   /var/www/acme;
        }
    }

    # HTTPS server (port 443) — reverse proxy

    # ── chat.koudai.cool HTTPS (Cloudflare → origin :443) ──
    server {
        listen       443 ssl;
        server_name  chat.koudai.cool;

        ssl_certificate      /etc/nginx/ssl/pixelox.crt;
        ssl_certificate_key  /etc/nginx/ssl/pixelox.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Guest token for no-auth Open WebUI
        set $guest_token 'token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjQ2ZTI2ZWI4LTA2NjYtNDM3MS1hOTgyLTMwYmExYTQ0ODlmYyIsImVtYWlsIjoiZ3Vlc3RAY2hhdC5sb2NhbCIsIm5hbWUiOiJHdWVzdCIsInJvbGUiOiJhZG1pbiIsImlhdCI6MTc4MDAwNTQyMCwiZXhwIjoxODExNTQxNDIwfQ.fi5EruaKiGUhKuLjYLmY61NIkcKpnreEEWfSoonmKEw';

        # 安全加固
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        location / {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie "$guest_token";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }
    server {
        listen       443 ssl default_server;
        server_name  pixelox.cn www.pixelox.cn 47.83.156.11;

        ssl_certificate      /etc/nginx/ssl/pixelox.crt;
        ssl_certificate_key  /etc/nginx/ssl/pixelox.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Location for ACME challenge
        location /.well-known/acme-challenge/ {
            root   /var/www/acme;
        }

        # ── AI CS MVP routes (port 8700) ──
        location /status {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /launch {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /brand {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /funnel {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /widget {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /blog {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering on;
        }

        location /oneapi {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /ready {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /static/ {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering on;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }


        # ── 乔木Tab 新标签页 ──
        location /tab/ {
            alias /var/www/tab.pixelox.top/;
            index newtab.html;
            try_files $uri $uri/ =404;
        }

                # ── 乔木Tab 同步API ──
        location = /tab/sync {
            proxy_pass http://127.0.0.1:8766/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

# ── 在线工具箱 ──
        location /tools/ {
            alias /var/www/tools/;
            try_files $uri $uri/ =404;
        }

        # ── AI工具导航 ──
        location /aitools/ {
            alias /var/www/aitools/;
            try_files $uri $uri/ =404;
        }

        # ── 在线计算器 ──
        location /calc/ {
            alias /var/www/calc/;
            try_files $uri $uri/ =404;
        }

        location = /sitemap.xml { root /var/www; }

        location = /robots.txt {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

        

        # ── AI Chat 页面入口 ──
        location = /chat {
            proxy_pass http://127.0.0.1:16108/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # ── AI Chat (server.js on port 3000) ──
location /api/v1/ {            proxy_pass http://127.0.0.1:16108;            proxy_set_header Host $host;            proxy_set_header X-Real-IP $remote_addr;            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;            proxy_set_header X-Forwarded-Proto $scheme;            proxy_http_version 1.1;            proxy_buffering off;            proxy_read_timeout 120s;        }
        location /api/login {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
        location /api/register {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
        location /api/chat {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }
        location /api/conversations {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
        location /api/user {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
        location /api/recharge {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
        location /api/upload {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
            client_max_body_size 10M;
        }
        location /uploads/ {
            proxy_pass http://127.0.0.1:16108;
            proxy_set_header Host $host;
        }

        # ── AI CS MVP API routes ──
        location /api/ {
            proxy_pass http://127.0.0.1:8700;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # ── 口袋万物·世界杯 API (port 8706) ──
        location /wc/ {
            proxy_pass http://127.0.0.1:8706;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # Default: proxy to Hermes PWA (port 8888)
        location / {
            proxy_pass http://hermes_pwa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
