# koudai.cool -> 5090 (via SSH tunnel)
server {
    listen 80;
    server_name koudai.cool www.koudai.cool;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name koudai.cool www.koudai.cool;
    
    ssl_certificate /etc/nginx/ssl/koudai.cool.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/koudai.cool.privkey.pem;
    
    location /_app/immutable/ {
        proxy_pass http://127.0.0.1:16006;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    location /static/ {
        proxy_pass http://127.0.0.1:16006;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    
    location /5090/health { proxy_pass http://127.0.0.1:16008/health; proxy_set_header Host $host; }
    location /5090/api/ { proxy_pass http://127.0.0.1:16008/api/; proxy_set_header Host $host; }
    location /5090/v1/ { proxy_pass http://127.0.0.1:16008/v1/; proxy_set_header Host $host; }
    location /5090/recharge { proxy_pass http://127.0.0.1:16008/recharge; proxy_set_header Host $host; }
    location /5090/ { proxy_pass http://127.0.0.1:16008/; proxy_set_header Host $host; }
    
    location / {
        proxy_pass http://127.0.0.1:16006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
    
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
