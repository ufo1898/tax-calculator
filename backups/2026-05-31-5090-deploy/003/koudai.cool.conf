server {
    listen 80;
    server_name koudai.cool www.koudai.cool;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name koudai.cool www.koudai.cool;

    ssl_certificate /etc/letsencrypt/live/koudai.cool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koudai.cool/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:;" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/koudai;
    index index.html;

    # 5090 API Server
    location /5090/ {
        proxy_pass http://127.0.0.1:6008/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Hot
    location /hot/ {
        proxy_pass http://127.0.0.1:8911/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else → Open WebUI
    location / {
        proxy_pass http://127.0.0.1:6006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
